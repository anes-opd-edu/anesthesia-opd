<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c7f49">
<title>麻醉衛教影片播放（跟診人員用）</title>
<style>
  :root {
    --primary: #1c7f49; --primary-dark: #145c35; --primary-light: #e8f3ec;
    --blue: #187598; --blue-light: #eaf3f7; --navy: #00294a;
    --bg: #f5f8f6; --text: #1f2d27; --border: #cfdcd4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: 'Noto Sans TC','PingFang TC','Microsoft JhengHei',Arial,sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  header { background: white; border-bottom: 4px solid var(--primary); padding: 10px 18px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  header img { height: 44px; }
  .header-title { font-size: 20px; font-weight: 900; color: var(--navy); line-height: 1.25; }
  .header-sub { font-size: 13px; color: var(--primary); font-weight: 700; }

  main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 22px; overflow-y: auto; }
  .screen { display: none; width: 100%; max-width: 980px; }
  .screen.active { display: block; }

  .prompt { text-align: center; font-size: 26px; font-weight: 900; color: var(--navy); margin-bottom: 24px; }
  .prompt small { display: block; font-size: 16px; color: #5a6b62; font-weight: 500; margin-top: 6px; }

  .type-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
  .type-card { background: white; border: 3px solid var(--border); border-radius: 22px; padding: 34px 20px; text-align: center; cursor: pointer; transition: transform .12s, border-color .12s; }
  .type-card:active { transform: scale(.97); border-color: var(--primary); }
  .type-card .icon { font-size: 56px; margin-bottom: 14px; }
  .type-card .name { font-size: 30px; font-weight: 900; color: var(--navy); }
  .type-card .en { font-size: 15px; color: #5a6b62; margin-top: 6px; }

  .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
  .lang-btn { background: white; border: 3px solid var(--border); border-radius: 20px; padding: 26px 18px; text-align: center; cursor: pointer; transition: transform .12s, border-color .12s; position: relative; }
  .lang-btn:active { transform: scale(.97); border-color: var(--primary); }
  .lang-btn .native { font-size: 28px; font-weight: 900; color: var(--primary-dark); }
  .lang-btn .zh { font-size: 16px; color: #5a6b62; margin-top: 6px; }
  .lang-btn.disabled { opacity: .45; cursor: default; }
  .lang-btn.disabled:active { transform: none; border-color: var(--border); }
  .lang-btn .badge { position: absolute; top: 10px; right: 12px; background: var(--blue-light); color: var(--blue); font-size: 13px; font-weight: 800; padding: 3px 10px; border-radius: 999px; }

  .back-btn { display: inline-flex; align-items: center; gap: 8px; background: white; border: 2.5px solid var(--primary); color: var(--primary-dark); font-size: 20px; font-weight: 800; padding: 12px 26px; border-radius: 999px; cursor: pointer; font-family: inherit; margin-bottom: 20px; }
  .back-btn:active { background: var(--primary-light); }

  #screen-player { max-width: 1100px; text-align: center; }
  .player-title { font-size: 21px; font-weight: 900; color: var(--navy); margin-bottom: 14px; }
  .player-box { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 18px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,41,74,.25); }
  .player-box iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .ended-tip { display: none; margin-top: 16px; font-size: 19px; font-weight: 800; color: var(--primary-dark); }

  footer { text-align: center; font-size: 13px; color: #8a978f; padding: 8px; flex-shrink: 0; }
</style>
</head>

  <div>
    <div class="header-title">麻醉衛教影片</div>
    <div class="header-sub">跟診人員播放專用 · 請選影片後拿給病人觀看</div>
  </div>
</header>

<main>
  <!-- 第一步：選麻醉方式 -->
  <section class="screen active" id="screen-type">
    <div class="prompt">請選擇麻醉方式<small>病人即將接受哪一種麻醉？</small></div>
    <div class="type-grid" id="typeGrid"></div>
  </section>

  <!-- 第二步：選語言 -->
  <section class="screen" id="screen-lang">
    <button class="back-btn" onclick="showScreen('type')">◀ 重選麻醉方式</button>
    <div class="prompt" id="langPrompt"></div>
    <div class="lang-grid" id="langGrid"></div>
  </section>

  <!-- 播放 -->
  <section class="screen" id="screen-player">
    <button class="back-btn" onclick="stopAndBack()">◀ 返回選單</button>
    <div class="player-title" id="playerTitle"></div>
    <div class="player-box"><div id="ytPlayer"></div></div>
    <div class="ended-tip" id="endedTip">✅ 播放完畢，即將回到主選單…</div>
  </section>
</main>

<footer>秀傳醫療體系 麻醉科 · 病人衛教影片（診間版）</footer>

<script>
/* ====== 影片 ID 設定：上傳 YouTube 後把 ID 填進來，空字串 = 顯示「製作中」 ====== */
const VIDEOS = {
  ga:     { name: '全身麻醉', en: 'General Anesthesia', icon: '😴',
            ids: { zh: 'qXKA__VDcP8', tai: '', en: '', id: '', vi: '' } },
  spinal: { name: '半身麻醉', en: 'Spinal Anesthesia', icon: '💉',
            ids: { zh: 'H810u5VxYlE', tai: '', en: '', id: '', vi: '' } },
  iv:     { name: '靜脈麻醉', en: 'IV Sedation', icon: '💤',
            ids: { zh: 'BZR0qD36G_A', tai: '', en: '', id: '', vi: '' } }
};
const LANGS = [
  { key: 'zh',  native: '國語',             zh: '中文配音' },
  { key: 'tai', native: '台語',             zh: '台語配音' },
  { key: 'en',  native: 'English',          zh: '英語配音' },
  { key: 'id',  native: 'Bahasa Indonesia', zh: '印尼語配音' },
  { key: 'vi',  native: 'Tiếng Việt',       zh: '越南語配音' }
];

let currentType = null, ytPlayer = null, ytReady = false, endTimer = null;

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

/* 第一步 */
const typeGrid = document.getElementById('typeGrid');
Object.entries(VIDEOS).forEach(([key, v]) => {
  const card = document.createElement('div');
  card.className = 'type-card';
  card.innerHTML = `<div class="icon">${v.icon}</div><div class="name">${v.name}</div><div class="en">${v.en}</div>`;
  card.onclick = () => { currentType = key; buildLangScreen(); showScreen('lang'); };
  typeGrid.appendChild(card);
});

/* 第二步 */
function buildLangScreen() {
  const v = VIDEOS[currentType];
  document.getElementById('langPrompt').innerHTML =
    `${v.icon} ${v.name}<small>請選擇病人聽得懂的語言</small>`;
  const grid = document.getElementById('langGrid');
  grid.innerHTML = '';
  LANGS.forEach(lang => {
    const id = v.ids[lang.key];
    const btn = document.createElement('div');
    btn.className = 'lang-btn' + (id ? '' : ' disabled');
    btn.innerHTML = `<div class="native">${lang.native}</div><div class="zh">${lang.zh}</div>` +
                    (id ? '' : '<div class="badge">製作中</div>');
    if (id) btn.onclick = () => playVideo(id, v, lang);
    grid.appendChild(btn);
  });
}

/* 播放：YouTube IFrame API，播完自動回主選單 */
function playVideo(videoId, v, lang) {
  document.getElementById('playerTitle').textContent = `${v.icon} ${v.name} — ${lang.native}`;
  document.getElementById('endedTip').style.display = 'none';
  showScreen('player');
  const create = () => {
    if (ytPlayer) { ytPlayer.loadVideoById(videoId); return; }
    ytPlayer = new YT.Player('ytPlayer', {
      videoId: videoId,
      playerVars: { autoplay: 1, rel: 0, playsinline: 1, modestbranding: 1 },
      events: {
        onReady: e => e.target.playVideo(),
        onStateChange: e => {
          if (e.data === YT.PlayerState.ENDED) {
            document.getElementById('endedTip').style.display = 'block';
            clearTimeout(endTimer);
            endTimer = setTimeout(() => { stopAndBack(); }, 8000);
          }
        }
      }
    });
  };
  if (ytReady) create();
  else window._pendingPlay = create;
}
function stopAndBack() {
  clearTimeout(endTimer);
  if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
  document.getElementById('endedTip').style.display = 'none';
  showScreen('type');
}
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  if (window._pendingPlay) { window._pendingPlay(); window._pendingPlay = null; }
};
(function() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();
</script>
</body>
</html>
